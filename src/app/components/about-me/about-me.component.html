<section
  id="about"
  class="scroll-mt-16 min-h-dvh flex items-center justify-center px-6 py-10 max-md:px-4 max-md:py-5"
>
  <div
    class="container-custom flex items-center gap-16 max-md:flex-col max-md:gap-12 max-md:text-center max-md:items-center"
  >
    <!-- ── Left: Image with floating code snippets ── -->
    <div class="shrink-0 max-md:w-full max-md:flex max-md:justify-center">
      <div class="group relative">
        <!-- Image Frame -->
        <div
          class="relative overflow-hidden rounded-2xl p-3 border border-white/10 transition-transform duration-300 ease-[cubic-bezier(0.32,0.72,0,1)] group-hover:scale-[1.03]"
          style="
            background: linear-gradient(135deg, rgba(0, 77, 97, 0.12), rgba(130, 38, 89, 0.08));
            backdrop-filter: blur(8px);
            box-shadow:
              0 24px 64px rgba(0, 0, 0, 0.4),
              0 0 0 1px rgba(255, 255, 255, 0.03) inset;
          "
        >
          <img
            [src]="about.image.src"
            [alt]="about.image.alt"
            width="800"
            height="800"
            loading="eager"
            class="block rounded-xl object-contain shadow-[0_8px_32px_rgba(0,0,0,0.3)]"
            style="width: clamp(300px, 30vw, 520px); height: clamp(360px, 44vw, 720px); object-position: center center; background-color: #111;"
          />
          <!-- Hover overlay -->
          <div
            class="absolute inset-3 rounded-xl opacity-0 transition-opacity duration-300 pointer-events-none group-hover:opacity-100"
            style="background: linear-gradient(to top, rgba(0, 77, 97, 0.15), transparent)"
          ></div>
        </div>

        <!-- Floating code snippets -->
        <div
          class="absolute -top-3 -right-5 flex items-center px-3.5 py-1.5 rounded-[10px] border border-white/8 opacity-0 -translate-y-2 transition-all duration-400 ease-[cubic-bezier(0.32,0.72,0,1)] delay-100 group-hover:opacity-100 group-hover:translate-y-0 z-[2] max-md:-right-2 max-md:-top-2.5"
          style="
            background: rgba(26, 26, 26, 0.92);
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
          "
        >
          <span
            class="font-mono text-xs font-medium text-accent-teal-light tracking-wide before:content-['>'] before:mr-1.5 before:text-text-muted"
            >{{ about.codeSnippets[0] }}</span
          >
        </div>
        <div
          class="absolute -bottom-3 -left-5 flex items-center px-3.5 py-1.5 rounded-[10px] border border-white/8 opacity-0 translate-y-2 transition-all duration-400 ease-[cubic-bezier(0.32,0.72,0,1)] delay-200 group-hover:opacity-100 group-hover:translate-y-0 z-[2] max-md:-left-2 max-md:-bottom-2.5"
          style="
            background: rgba(26, 26, 26, 0.92);
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
          "
        >
          <span
            class="font-mono text-xs font-medium text-accent-teal-light tracking-wide before:content-['>'] before:mr-1.5 before:text-text-muted"
            >{{ about.codeSnippets[1] }}</span
          >
        </div>
      </div>
    </div>

    <!-- ── Right: Content ── -->
    <div class="flex flex-col min-w-0">
      <!-- Greeting -->
      <span class="font-label text-sm font-medium text-accent-teal-light tracking-wider mb-4">
        {{ greeting() }} {{ about.greetingSuffix }}
      </span>

      <!-- Name -->
      <h1
        class="name-reveal font-heading text-display font-bold leading-[1.1] -tracking-[0.03em] mb-3"
      >
        {{ about.name }}
      </h1>

      <!-- Role -->
      <h2 class="font-heading text-h3 font-medium text-metallic-silver mb-8">
        {{ about.role }}
      </h2>

      <!-- Bio -->
      <p
        class="font-body text-base font-normal leading-loose text-text-secondary max-w-[520px] max-md:max-w-full"
      >
        {{ about.bio[0] }}
      </p>

      <p
        class="font-body text-sm font-normal text-text-muted italic mt-6 max-w-[520px] max-md:max-w-full"
      >
        {{ about.bio[1] }}
      </p>

      <!-- Resume + Contact Dock (same row) -->
      <div
        class="flex items-center gap-6 mt-10 flex-wrap max-md:flex-col max-md:items-center max-md:gap-5"
      >
        <!-- Resume Button -->
        <a
          [href]="resumeUrl"
          target="_blank"
          rel="noopener noreferrer"
          class="inline-flex items-center gap-2.5 px-7 py-3 font-label text-sm font-semibold tracking-wider uppercase text-text-primary rounded-xl no-underline cursor-pointer w-fit transition-all duration-250 border border-white/6 hover:-translate-y-0.5 active:translate-y-0 shrink-0"
          style="
            background: linear-gradient(135deg, var(--color-accent-teal), rgba(0, 110, 138, 0.85));
            box-shadow:
              0 4px 16px rgba(0, 77, 97, 0.25),
              0 0 0 1px rgba(255, 255, 255, 0.04) inset;
          "
          onmouseenter="
            this.style.background =
              'linear-gradient(135deg, var(--color-accent-teal-light), var(--color-accent-teal))';
            this.style.boxShadow =
              '0 8px 28px rgba(0, 77, 97, 0.35), 0 0 0 1px rgba(255, 255, 255, 0.08) inset';
          "
          onmouseleave="
            this.style.background =
              'linear-gradient(135deg, var(--color-accent-teal), rgba(0, 110, 138, 0.85))';
            this.style.boxShadow =
              '0 4px 16px rgba(0, 77, 97, 0.25), 0 0 0 1px rgba(255, 255, 255, 0.04) inset';
          "
        >
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="w-[18px] h-[18px]"
          >
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="7 10 12 15 17 10" />
            <line x1="12" y1="15" x2="12" y2="3" />
          </svg>
          {{ about.resume.label }}
        </a>

        <!-- Floating Dock (fixed-height wrapper prevents layout shift on hover) -->
        <div class="h-[70px] flex items-center">
          <app-floating-dock [items]="socialLinks()" />
        </div>
      </div>
    </div>
  </div>
</section>
