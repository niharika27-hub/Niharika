name: Update LeetCode Data

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight UTC
  workflow_dispatch: # Allows manual trigger

jobs:
  update-leetcode:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 'lts/*' # Always uses latest LTS - truly future-proof!

      - name: Fetch LeetCode Data
        run: node scripts/leetcode.js

      - name: Commit updated JSON
        run: |
          git config --global user.name "leetcode-bot"
          git config --global user.email "bot@example.com"
          git add public/data/leetcode.json
          git diff --staged --quiet || git commit -m "Update LeetCode data"
          git push
